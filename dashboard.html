<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />

    <meta  name="viewport" content="width=device-width, initial-scale=1.0" />

    <meta name="description" content="User dashboard for managing account and shopping." />

    <title>User Dashboard</title>

    <link rel="stylesheet"  href="styles/main.min.css" >

    <link  rel="icon"  href="assets/favicon.ico" type="image/x-icon" >

    <style>

        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background-color: #f5f5f5;
        }

        .dashboard-container {
            max-width: 900px;
            margin: 50px auto;
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: center;
        }

        .dashboard-container h1 {
            color: #007bff;
            margin-bottom: 20px;
        }

        .user-info {
            margin: 20px 0;
            font-size: 18px;
        }

        .dashboard-buttons {
            margin-top: 30px;
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .dashboard-buttons button,
        .dashboard-buttons a {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            background-color: #007bff;
            color: white;
            text-decoration: none;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.3s ease;
        }

        .dashboard-buttons button:hover,
        .dashboard-buttons a:hover {
            background-color: #0056b3;
        }

        @media (max-width: 768px) {

            .dashboard-container {
                margin: 20px;
                padding: 25px;
            }

            .dashboard-buttons {
                flex-direction: column;
            }
        }

    </style>
</head>

<body>

    <main>

        <div class="dashboard-container">

            <h1>  Welcome to Your Dashboard 🎉 </h1>

            <div class="user-info">

                <p> Logged in as: <strong id="userEmail"> Loading... </strong> </p>

            </div>

            <div class="dashboard-buttons">

                <a href="index.html"> 🛍 Continue Shopping </a>

                <button id="logoutBtn">🚪 Logout </button>

            </div>

        </div>

    </main>

    <script type="module" src="scripts/app.min.js" defer ></script>

    <script type="module" src="scripts/auth.js" defer ></script>

</body>
</html>
