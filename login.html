<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="description" content="Login securely to your e-commerce account using Firebase authentication.">

    <title>Login | E-Commerce Store</title>

    <!-- CSS -->
    <link rel="stylesheet" href="styles/main.min.css">

    <!-- Favicon -->
    <link rel="icon" href="assets/favicon.ico" type="image/x-icon">
</head>

<body>

    <!-- HEADER -->
    <header>

        <!-- LOGO -->
        <div class="logo">
            <img src="assets/logo.webp" alt="Store Logo" width="60" height="60" loading="lazy">
        </div>

        <!-- CART -->
        <div class="cart">
            <img  src="assets/cart.svg"  alt="Cart Icon" width="30" height="30" loading="lazy">

            <span class="cart-count">0</span>
        </div>

        <!-- HAMBURGER -->
        <div class="hamburger" id="hamburger">
            <span></span>
            <span></span>
            <span></span>
        </div>

        <!-- NAVIGATION -->
        <nav class="nav-menu">
            <ul>
                <li>
                    <a href="index.html">Home</a>
                </li>

                <li>
                    <a href="index.html#products">Products</a>
                </li>

                <li>
                    <a href="signup.html">Sign Up</a>
                </li>

                <li>
                    <button id="logoutBtn" class="logout-link" type="button"> Logout </button>
                </li>
            </ul>
        </nav>

    </header>

    <!-- MAIN CONTENT -->
    <main class="auth-container">

        <form id="loginForm" class="auth-form">

            <h2>Login</h2>

            <!-- EMAIL -->
            <input 
                type="email" 
                id="loginEmail" 
                placeholder="Email"
                autocomplete="email"
                required
            >

            <!-- PASSWORD -->
            <div class="password-field">

                <input 
                    type="password" 
                    id="loginPassword" 
                    placeholder="Password"
                    autocomplete="current-password"
                    required
                >
                <span class="toggle-password"  data-target="loginPassword" > 👁 </span>

            </div>

            <!-- ERROR MESSAGE -->
            <small class="error" id="loginError"></small>

            <!-- LOGIN BUTTON -->
            <button type="submit"> Login </button>

            <!-- FORGOT PASSWORD -->
            <a href="forgot-password.html" class="forgot"> Forgot Password? </a>

            <!-- SIGNUP -->
            <p> Don’t have an account? <a href="signup.html"> Sign up </a> </p>

        </form>
    </main>

    <!-- SCRIPTS -->
    <script type="module" src="scripts/app.min.js" defer></script>

    <script type="module" src="scripts/auth.js" defer></script>

</body>

</html>
