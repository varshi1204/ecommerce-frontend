<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="description" content="Shop the latest fashion products online with fast delivery and secure checkout.">

    <title>E-Commerce Frontend</title>

    <!-- Minified CSS -->
    <link rel="stylesheet" href="styles/main.min.css">

    <!-- Favicon -->
    <link rel="icon" href="assets/favicon.ico" type="image/x-icon">

</head>

<body>
    <!-- MAIN LANDMARK -->
    <main>
        <!-- HEADER -->
        <header>
            <!-- LOGO -->
            <div class="logo">
                <a href="index.html">
                    <img src="assets/logo.webp" alt="Brand Logo" width="60" height="60" loading="lazy" decoding="async">
                </a>
            </div>

            <!-- HAMBURGER MENU -->
            <div  class="hamburger" id="hamburger">
                <span></span>
                <span></span>
                <span></span>

            </div>

            <!-- NAVIGATION -->
            <nav class="nav-menu" id="menu">
                
                <ul>
                    <li>
                        <a href="index.html"> Home </a>
                    </li>

                    <li>
                        <a href="product.html"> Products </a>
                    </li>

                    <li>
                        <a href="about.html"> About </a>
                    </li>

                    <li>
                        <a href="contact.html"> Contact </a>
                    </li>

                    <li>
                        <a href="cart.html"> Cart </a>
                    </li>

                    <li>
                        <a id="loginLink" href="login.html"> Login </a>
                    </li>

                    <li>
                        <button id="logoutBtn" class="logout-link" type="button"> Logout </button>
                    </li>
                </ul>
            </nav>

            <!-- SEARCH BAR -->
            <div class="search-bar">

                <input type="text" placeholder="Search products..." aria-label="Search products">

                <button> Search </button>

            </div>

            <!-- CART ICON -->
            <a href="cart.html" class="cart" aria-label="Shopping Cart">

                <img src="assets/cart.svg" alt="Cart Icon" width="30" height="30" loading="lazy" decoding="async">

                <span class="cart-count"> 0 </span>

            </a>

        </header>

        <!-- HERO SECTION -->
        <section class="hero">

            <div class="hero-content">

                <h1 class="fade-in"> Biggest Sale of <br> the Year! 🥳🎉  </h1>

                <p class="fade-in delay"> Discover the latest trends at unbeatable prices. 🎊 </p>

            </div>

            <div class="hero-buttons">

                <a href="product.html">
                    <button class="cta-btn fade-in delay-2"> Shop Now </button>
                </a>

            </div>

        </section>

        <!-- PRODUCTS SECTION -->
        <section class="products">

            <h2> Featured Products </h2>

            <div class="product-grid" id="productGrid">

                <!-- PRODUCT 1 -->
                <div class="product-card">

                    <a href="product.html?id=1">

                        <img src="assets/product1.webp" srcset=" assets/product1.webp 480w, assets/product1.webp 768w, assets/product1.webp 1200w"
                            sizes="(max-width: 768px) 100vw, 50vw"
                            alt="Jacket"
                            width="300"
                            height="300"
                            loading="lazy"
                            decoding="async">

                        <h3> Jacket </h3>

                    </a>

                    <p class="price"> $10.99 </p>

                    <button class="btn">  Add to Cart </button>

                </div>

                <!-- PRODUCT 2 -->
                <div class="product-card">

                    <a href="product.html?id=2">

                        <img src="assets/product2.webp" srcset=" assets/product2.webp 480w, assets/product2.webp 768w, assets/product2.webp 1200w"
                            sizes="(max-width: 768px) 100vw, 50vw"
                            alt="T-Shirt"
                            width="300"
                            height="300"
                            loading="lazy"
                            decoding="async">

                        <h3> T-Shirt </h3>

                    </a>

                    <p class="price"> $9.10 </p>

                    <button class="btn"> Add to Cart  </button>

                </div>

                <!-- PRODUCT 3 -->
                <div class="product-card">

                    <a href="product.html?id=3">

                        <img src="assets/product3.webp" srcset=" assets/product3.webp 480w, assets/product3.webp 768w, assets/product3.webp 1200w "
                            sizes="(max-width: 768px) 100vw, 50vw"
                            alt="Jeans"
                            width="300"
                            height="300"
                            loading="lazy"
                            decoding="async" >

                        <h3> Jeans </h3>

                    </a>

                    <p class="price">  $30.89  </p>

                    <button class="btn"> Add to Cart  </button>

                </div>

                <!-- PRODUCT 4 -->
                <div class="product-card">

                    <a href="product.html?id=4">

                        <img src="assets/product4.webp" srcset=" assets/product4.webp 480w, assets/product4.webp 768w, assets/product4.webp 1200w "
                            sizes="(max-width: 768px) 100vw, 50vw"
                            alt="Shoes"
                            width="300"
                            height="300"
                            loading="lazy"
                            decoding="async">

                        <h3> Shoes </h3>

                    </a>

                    <p class="price"> $29.80 </p>

                    <button class="btn"> Add to Cart </button>

                </div>

            </div>

        </section>

    </main>

    <!-- MINIFIED JS -->
    <script src="scripts/app.min.js" defer></script>

</body>

</html>
