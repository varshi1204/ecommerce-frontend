<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta 
      name="viewport" 
      content="width=device-width, initial-scale=1.0"
    >

    <meta 
      name="description" 
      content="View and manage your shopping cart items securely."
    >

    <title>Your Cart</title>

    <link rel="stylesheet" href="styles/main.min.css">

    <link rel="icon" href="assets/favicon.ico" type="image/x-icon">
</head>

<body>

<header>

    <div class="logo">
        <img 
          src="assets/logo.webp" 
          alt="Brand Logo"
          width="60"
          height="60"
        >
    </div>

    <div class="hamburger" id="hamburger">
        <span></span><span></span><span></span>
    </div>

    <nav class="nav-menu">
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="index.html#products">Products</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Contact</a></li>

            <li><a id="loginLink" href="login.html">Login</a></li>

            <li>
                <button id="logoutBtn" class="logout-link" type="button">
                    Logout
                </button>
            </li>
        </ul>
    </nav>

    <div class="cart">
        <img 
          src="assets/cart.svg" 
          alt="Cart Icon"
          width="30"
          height="30"
        >

        <span class="cart-count">0</span>
    </div>

</header>

<main class="cart-page">

    <h1>Your Shopping Cart</h1>

    <div id="cartItems"></div>

    <div class="cart-summary">

        <h2> Total: $ <span id="cartTotal">0.00</span> </h2>

        <div class="cart-actions">

            <a href="index.html" class="continue-btn"> ← Continue Shopping </a>

            <button id="checkoutBtn" class="checkout-btn"> Proceed to Checkout
            </button>

        </div>

    </div>

</main>

<script src="scripts/app.min.js" defer></script>

</body>
</html>
