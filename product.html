<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="description" content="View product details, select quantity, and add products to cart securely.">

    <title>Product Details</title>

    <link rel="stylesheet" href="styles/main.min.css">

    <link rel="icon" href="assets/favicon.ico"  type="image/x-icon">
</head>

<body>

    <!-- HEADER -->
    <header>

        <!-- LOGO -->
        <div class="logo">
            <img  src="assets/logo.webp"  alt="Brand Logo"  width="60" height="60" loading="eager"  decoding="async">
        </div>

        <!-- HAMBURGER -->
        <div class="hamburger" id="hamburger">
            <span></span>
            <span></span>
            <span></span>
        </div>

        <!-- NAVIGATION -->
        <nav class="nav-menu">

            <ul>
                <li><a href="index.html">Home</a></li>

                <li>
                    <a href="index.html#products"> Products </a>
                </li>

                <li><a href="#">About</a></li>

                <li><a href="#">Contact</a></li>

                <li>
                    <a id="loginLink" href="login.html"> Login  </a>
                </li>

                <li>
                    <button  id="logoutBtn" class="logout-link" type="button">  Logout </button>
                </li>
            </ul>

        </nav>

        <!-- CART -->
        <div class="cart">

            <img src="assets/cart.svg" alt="Cart Icon" width="30" height="30">

            <span class="cart-count">0</span>
        </div>

    </header>

    <!-- MAIN CONTENT -->
    <main>

        <section class="product-detail">

            <div
                id="product-container"
                class="product-detail-card">

                <!-- PRODUCT IMAGE -->
                <div class="image-zoom-wrapper">

                    <img id="mainProductImage" alt="Product Image" width="400" height="400"  loading="lazy"  decoding="async">

                </div>

                <!-- PRODUCT DETAILS -->
                <div class="details">

                    <h1 id="productTitle"></h1>

                    <p class="price">
                        $<span id="productPrice"></span>
                    </p>

                    <p id="productDescription"></p>

                    <!-- SIZE -->
                    <div class="variation">

                        <label for="sizeSelect"> Size: </label>

                        <select id="sizeSelect" name="size">

                            <option value="L"> Small </option>

                            <option value="L"> Medium  </option>

                            <option value="L"> Large  </option>

                        </select>

                    </div>

                    <!-- COLOR -->
                    <div class="variation">

                        <label for="colorSelect"> Color: </label>

                        <select id="colorSelect" name="color">

                            <option value="Black"> Black </option>

                            <option value="Red"> Red </option>
 
                            <option value="Blue"> Blue </option>

                        </select>

                    </div>

                    <!-- QUANTITY -->
                    <div class="quantity-control">

                        <button id="decreaseQty"> - </button>

                        <span id="quantity"> 1 </span>

                        <button id="increaseQty"> + </button>

                    </div>

                    <!-- TOTAL -->
                    <p class="total-price"> Total:  $<span id="totalPrice"> </span> </p>

                    <!-- ADD TO CART -->
                    <button class="add-to-cart"> Add to Cart </button>

                </div>

            </div>

        </section>

    </main>

    <!-- FOOTER -->
    <footer class="footer">

        <div class="footer-content">

            <p> © 2026 ShopEase-ecommerce. All Rights Reserved. </p>

            <p> Made with ❤️ using FakeStore API </p>

        </div>

    </footer>

    <script src="scripts/app.min.js" defer> </script>

</body>

</html>
